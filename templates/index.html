<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RuralCare | Remote Intake Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Inter', sans-serif; }
    .bloom-btn {
        box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bloom-btn:hover {
        box-shadow: 0 0 25px rgba(37, 99, 235, 0.7);
        transform: translateY(-2px);
    }
    .glass-overlay {
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(12px);
    }
</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

<div id="successOverlay" class="hidden fixed inset-0 glass-overlay z-50 flex flex-col items-center justify-center p-6">
    <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    </div>
    <h2 class="text-3xl font-bold text-slate-900 mb-2">Transmission Successful</h2>
    <p class="text-slate-500 font-medium mb-10 text-center max-w-md">Your health data has been securely encrypted and transmitted to your care provider's database.</p>
    <button onclick="location.reload()" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-semibold transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 active:scale-95">
        Submit Another Record
    </button>
</div>

<div id="loadingOverlay" class="hidden fixed inset-0 glass-overlay z-50 flex flex-col items-center justify-center p-6">
    <div class="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mb-6"></div>
    <h2 class="text-2xl font-bold text-slate-900 mb-2">Encrypting & Saving Data...</h2>
    <p class="text-slate-500 font-medium">Connecting to secure health database.</p>
</div>

<header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md">R</div>
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">RuralCare <span class="text-slate-400 font-medium text-lg ml-2">| Patient Connect Portal</span></h1>
    </div>
</header>

<main class="flex-grow max-w-4xl mx-auto px-6 py-10 w-full">
    <form id="patientForm" class="space-y-8">

        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
            <h2 class="text-xl font-semibold text-slate-900 mb-6 pb-2 border-b border-slate-100">Patient Information</h2>
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Patient Name</label>
                        <input type="text" id="patient_name" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Patient ID</label>
                        <input type="text" id="patient_id" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Age</label>
                        <input type="number" id="age" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Sex</label>
                        <select id="sex" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                            <option>Female</option>
                            <option>Male</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Location / County</label>
                        <input type="text" id="rural_location_county" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Caregiver Name</label>
                        <input type="text" id="caregiver_name" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Contact Method</label>
                        <select id="preferred_contact_method" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                            <option>SMS</option>
                            <option>Phone Call</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Connectivity Status</label>
                        <select id="connectivity_status" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                            <option>Good</option>
                            <option>Fair</option>
                            <option>Poor</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
            <h2 class="text-xl font-semibold text-slate-900 mb-6 pb-2 border-b border-slate-100">Vital Signs & Symptoms</h2>
            <div class="grid grid-cols-3 gap-5 mb-8">
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Weight</label><input type="text" id="weight" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Blood Pressure</label><input type="text" id="blood_pressure" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Heart Rate</label><input type="text" id="heart_rate" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">SpO₂</label><input type="text" id="spo2" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Glucose</label><input type="text" id="glucose" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 outline-none"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1">Temperature</label><input type="text" id="temperature" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white focus:ring-2 outline-none"></div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" id="shortness_of_breath" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 transition-all"><span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">Shortness of breath</span></label>
                <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" id="chest_pain" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 transition-all"><span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">Chest pain</span></label>
                <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" id="dizziness" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 transition-all"><span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">Dizziness</span></label>
                <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" id="swelling" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 transition-all"><span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">Swelling</span></label>
                <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" id="fatigue" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 transition-all"><span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">Fatigue</span></label>
                <label class="flex items-center space-x-3 cursor-pointer group"><input type="checkbox" id="difficulty_sleeping_flat" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500 transition-all"><span class="text-sm font-medium text-slate-700 group-hover:text-slate-900 transition-colors">Difficulty sleeping flat</span></label>
            </div>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
            <h2 class="text-xl font-semibold text-slate-900 mb-6 pb-2 border-b border-slate-100">Notes & History</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div><label class="block text-sm font-medium text-slate-700 mb-2">Medication Notes</label><textarea id="medication_notes" rows="4" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white outline-none resize-none"></textarea></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-2">Additional Comments</label><textarea id="additional_notes" rows="4" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm focus:border-blue-500 focus:bg-white outline-none resize-none"></textarea></div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-center items-center gap-4 pt-4 pb-12">
            <button type="submit" class="w-full sm:w-auto bg-blue-600 text-white px-10 py-4 rounded-xl font-semibold bloom-btn text-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 active:scale-95">
                Securely Submit Data
            </button>
            <button type="button" id="fillTestDataBtn" class="w-full sm:w-auto bg-slate-100 text-slate-700 border border-slate-300 px-8 py-4 rounded-xl font-semibold hover:bg-slate-200 transition-all text-lg focus:outline-none active:scale-95 shadow-sm hover:shadow">
                Fill Demo Test Data
            </button>
        </div>

    </form>
</main>

<script>
document.getElementById("patientForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    document.getElementById("loadingOverlay").classList.remove("hidden");

    const patientData = {
        patient_information: {
            patient_name: document.getElementById("patient_name").value,
            patient_id: document.getElementById("patient_id").value,
            age: document.getElementById("age").value,
            sex: document.getElementById("sex").value,
            rural_location_county: document.getElementById("rural_location_county").value,
            caregiver_name: document.getElementById("caregiver_name").value,
            preferred_contact_method: document.getElementById("preferred_contact_method").value,
            connectivity_status: document.getElementById("connectivity_status").value
        },
        vital_signs: {
            weight: document.getElementById("weight").value,
            blood_pressure: document.getElementById("blood_pressure").value,
            heart_rate: document.getElementById("heart_rate").value,
            spo2: document.getElementById("spo2").value,
            glucose: document.getElementById("glucose").value,
            temperature: document.getElementById("temperature").value
        },
        symptoms: {
            shortness_of_breath: document.getElementById("shortness_of_breath").checked,
            chest_pain: document.getElementById("chest_pain").checked,
            dizziness: document.getElementById("dizziness").checked,
            swelling: document.getElementById("swelling").checked,
            fatigue: document.getElementById("fatigue").checked,
            difficulty_sleeping_flat: document.getElementById("difficulty_sleeping_flat").checked
        },
        medications: [{
            medication_name: "Lisinopril", dose: "20mg", frequency: "Once daily", missed_doses: "2"
        }],
        notes: {
            medication_notes: document.getElementById("medication_notes").value,
            additional_notes: document.getElementById("additional_notes").value
        }
    };

    try {
        const response = await fetch("/api/patient-intake", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patientData)
        });
        if (!response.ok) throw new Error();

        setTimeout(() => {
            document.getElementById("loadingOverlay").classList.add("hidden");
            document.getElementById("successOverlay").classList.remove("hidden");
            document.getElementById("patientForm").reset();
        }, 1500); // Artificial delay to show saving

    } catch (error) {
        alert("Failed to connect to the database.");
        document.getElementById("loadingOverlay").classList.add("hidden");
    }
});

document.getElementById("fillTestDataBtn").addEventListener("click", function() {
    document.getElementById("patient_name").value = "João da Silva";
    document.getElementById("patient_id").value = "RUR-9021";
    document.getElementById("age").value = "68";
    document.getElementById("sex").value = "Male";
    document.getElementById("rural_location_county").value = "Cuiabá Rural";
    document.getElementById("caregiver_name").value = "Maria da Silva";
    document.getElementById("preferred_contact_method").value = "SMS";
    document.getElementById("connectivity_status").value = "Fair";
    document.getElementById("weight").value = "85 kg";
    document.getElementById("blood_pressure").value = "165/102";
    document.getElementById("heart_rate").value = "94";
    document.getElementById("spo2").value = "91%";
    document.getElementById("glucose").value = "178";
    document.getElementById("temperature").value = "37.4";
    document.getElementById("shortness_of_breath").checked = true;
    document.getElementById("chest_pain").checked = false;
    document.getElementById("dizziness").checked = true;
    document.getElementById("swelling").checked = false;
    document.getElementById("fatigue").checked = true;
    document.getElementById("difficulty_sleeping_flat").checked = true;
    document.getElementById("medication_notes").value = "Did not take blood pressure medication since Friday. Unable to arrange transportation to go pick up high-cost medication at the central urban health clinic.";
    document.getElementById("additional_notes").value = "He presents with persistent acute fatigue, nocturnal blood pressure spikes, and constant occipital headache.";
});
</script>
</body>
</html>
