<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rural RPM Patient Intake Form</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    margin:0;
    padding:0;
}

.header{
    background:#12355b;
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}

.row{
    display:flex;
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    flex:1;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h2{
    color:#12355b;
}

label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin-top:4px;
}

select{
    width:100%;
    padding:10px;
    margin-top:4px;
}

textarea{
    width:100%;
    padding:10px;
    margin-top:4px;
}

.symptoms{
    background:white;
    border-radius:10px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.notes{
    background:white;
    border-radius:10px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.button-area{
    text-align:center;
    margin-top:25px;
    margin-bottom:30px;
}

button{
    background:#1f7a4d;
    color:white;
    border:none;
    padding:15px 40px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#155a39;
}

</style>

</head>

<body>

<div class="header">
    Rural RPM Patient Intake Form
</div>

<div class="container">

    <div class="row">

        <div class="card">

            <h2>Patient Information</h2>

            <label>Patient Name</label>
            <input type="text">

            <label>Patient ID</label>
            <input type="text">

            <label>Age</label>
            <input type="number">

            <label>Sex</label>
            <select>
                <option>Female</option>
                <option>Male</option>
                <option>Other</option>
            </select>

            <label>Rural Location / County</label>
            <input type="text">

            <label>Caregiver Name</label>
            <input type="text">

            <label>Preferred Contact Method</label>
            <select>
                <option>SMS</option>
                <option>Phone Call</option>
                <option>Mobile App</option>
                <option>Caregiver</option>
            </select>

            <label>Connectivity Status</label>
            <select>
                <option>Good</option>
                <option>Fair</option>
                <option>Poor</option>
                <option>Offline</option>
            </select>

        </div>

        <div class="card">

            <h2>RPM / Triage Inputs</h2>

            <label>Weight</label>
            <input type="text">

            <label>Blood Pressure</label>
            <input type="text">

            <label>Heart Rate</label>
            <input type="text">

            <label>SpO₂</label>
            <input type="text">

            <label>Glucose</label>
            <input type="text">

            <label>Temperature</label>
            <input type="text">

        </div>

    </div>

    <div class="symptoms">

        <h2>Symptoms</h2>

        <input type="checkbox"> Shortness of breath<br><br>
        <input type="checkbox"> Chest pain<br><br>
        <input type="checkbox"> Dizziness<br><br>
        <input type="checkbox"> Swelling<br><br>
        <input type="checkbox"> Fatigue<br><br>
        <input type="checkbox"> Difficulty sleeping flat<br><br>

    </div>

    <div class="notes">

        <h2>Medication Notes</h2>

        <textarea rows="5"></textarea>

        <h2>Additional Notes</h2>

        <textarea rows="5"></textarea>

    </div>

    <div class="button-area">

        <button>
            Send to Multiagent Model
        </button>

    </div>

</div>

</body>
</html>
